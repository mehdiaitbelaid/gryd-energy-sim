# Static site, no build step.
[build]
  publish = "."
  command = ""

# Long-cache the vendored font and library; they are versioned by content.
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
